version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: lab3-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: lab3-app
    restart: always
    ports:
      - "4200:4200"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: