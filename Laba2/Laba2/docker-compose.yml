version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lab_db
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "4200:4200"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: student
      DB_PASSWORD: password
      DB_NAME: lab_db