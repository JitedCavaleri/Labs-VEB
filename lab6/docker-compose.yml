version: "3.8"

# Лаба 6:
#   - PostgreSQL (лабы 2-5) полностью заменён на MongoDB 6.
#   - Redis (лаба 5) остаётся без изменений.
#   - pgAdmin заменён на mongo-express для удобной инспекции коллекций (доступен на :8081).
#
# Все сервисы общаются по приватной сети wp_labs_network.
# В .env лежат: DB_USER, DB_PASSWORD, DB_NAME, MONGO_URI, REDIS_PASSWORD,
# CACHE_TTL_DEFAULT, JWT-секреты, OAuth, cookies. См. .env.example.

services:
  mongo:
    image: mongo:6
    container_name: wp_labs_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - wp_labs_mongo:/data/db
    networks:
      - wp_labs_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Лаба 5: кеш Redis ----
  # AUTH защищён паролем (REDIS_PASSWORD), AOF включён для персистентности.
  # Контейнер ОБЯЗАТЕЛЬНО на одной сети с приложением; снаружи порт открыт только
  # для удобства отладки через redis-cli с хоста — на проде эту строку нужно убрать.
  redis:
    image: redis:7-alpine
    container_name: wp_labs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wp_labs_redis:/data
    networks:
      - wp_labs_network
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  app:
    build: .
    container_name: wp_labs_app
    restart: unless-stopped
    environment:
      # App env (development | local | production)
      APP_ENV: ${APP_ENV}

      # --- Лаба 6: MongoDB ---
      # Полный URI собирается в .env, чтобы не плодить отдельных переменных.
      # authSource=admin — обязательно, т.к. root user создаётся в admin БД.
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      PORT: 4200

      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      # OAuth — Yandex
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_CALLBACK_URL: ${YANDEX_CALLBACK_URL}

      # OAuth — VK
      VK_CLIENT_ID: ${VK_CLIENT_ID}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET}
      VK_CALLBACK_URL: ${VK_CALLBACK_URL}

      # Cookies
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}

      # ---- Лаба 5: Redis ----
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      CACHE_TTL_DEFAULT: ${CACHE_TTL_DEFAULT}
    ports:
      - "4200:4200"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wp_labs_network

  # ---- Веб-клиент для MongoDB (аналог pgAdmin из лабы 5) ----
  # Открывается на http://localhost:8081. Логин/пароль — admin/admin
  # (см. ME_CONFIG_BASICAUTH_*). Для продакшена этот контейнер не нужен.
  mongo-express:
    image: mongo-express:1.0
    container_name: wp_labs_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - wp_labs_network

volumes:
  wp_labs_mongo:
  wp_labs_redis:

networks:
  wp_labs_network:
